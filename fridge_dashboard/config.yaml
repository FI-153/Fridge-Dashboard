# Home Assistant add-on manifest. Installed via the Add-on Store after adding this
# repository. `image:` makes Supervisor PULL the prebuilt image (built by CI) tagged
# with `version` below, instead of building on-device. entrypoint.sh maps the options
# to the app's env vars and talks to Core through the Supervisor API.
name: Fridge Dashboard
version: "1.2.1"
slug: fridge_dashboard
description: >-
  Full-screen dashboard (temperature, humidity, power) for a wall- or
  fridge-mounted tablet.
  ![Supports aarch64 Architecture](https://img.shields.io/badge/aarch64-yes-green.svg) ![Supports amd64 Architecture](https://img.shields.io/badge/amd64-yes-green.svg)
url: https://github.com/FI-153/Fridge-Dashboard
image: ghcr.io/fi-153/fridge-dashboard-{arch}
# ponytail: aarch64 + amd64 only — the uv base image has no armv7/armhf build.
arch:
  - aarch64
  - amd64
init: false
homeassistant_api: true
ports:
  "6123/tcp": 6123
ports_description:
  "6123/tcp": Dashboard — open http://<home-assistant-ip>:6123/ on the tablet
options:
  entity_temperature: ""
  entity_humidity: ""
  entity_power: ""
  entity_temperature_derivative: ""
  entity_humidity_derivative: ""
  page_refresh_interval_seconds: 60
  theme: dark
schema:
  entity_temperature: str
  entity_humidity: str
  entity_power: str?
  entity_temperature_derivative: str?
  entity_humidity_derivative: str?
  page_refresh_interval_seconds: int(5,)
  theme: list(dark|light)
