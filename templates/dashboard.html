<!DOCTYPE html>
<html lang="en">

<head>
  {% include "_head.html" %}
</head>

<body class="{{ theme }}">
  <table class="dashboard">
    <tr>
      <td class="col col_left">
        {% if power %}
        <div class="stack">
          <div class="card clock_card">
            <div class="clock" id="clock">{{ time }}</div>
          </div>
          <div class="card metric_card power_card">
            <div class="metric_label">Power</div>
            <div class="metric_value">
              <span class="value">{{ power.value }}</span><span class="unit">{{ power.unit }}</span>
            </div>
          </div>
        </div>
        {% else %}
        <div class="card clock_card">
          <div class="clock" id="clock">{{ time }}</div>
        </div>
        {% endif %}
      </td>
      <td class="col col_center">
        <div class="card metric_card">
          <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-label="temperature" role="img">
            <path fill="{{ temperature.color }}" d="M32 6a9 9 0 0 0-9 9v21.6a13 13 0 1 0 18 0V15a9 9 0 0 0-9-9zm0 6a3 3 0 0 1 3 3v9h-6v-9a3 3 0 0 1 3-3z"/>
          </svg>
          <div class="metric_value big">
            <span class="value">{{ temperature.value }}</span><span class="unit">{{ temperature.unit }}</span>
          </div>
          {% if temperature.trend %}
          <img class="trend trend_{{ temperature.trend }}" src="{{ url_for('static', filename='assets/arrow.svg') }}" alt="trend {{ temperature.trend }}">
          {% endif %}
        </div>
      </td>
      <td class="col col_right">
        <div class="card metric_card">
          <img class="icon" src="{{ url_for('static', filename='assets/droplet.svg') }}" alt="humidity">
          <div class="metric_value big">
            <span class="value">{{ humidity.value }}</span><span class="unit">{{ humidity.unit }}</span>
          </div>
          {% if humidity.trend %}
          <img class="trend trend_{{ humidity.trend }}" src="{{ url_for('static', filename='assets/arrow.svg') }}" alt="trend {{ humidity.trend }}">
          {% endif %}
        </div>
      </td>
    </tr>
  </table>
  <script src="{{ url_for('static', filename='js/clock.js') }}"></script>
</body>

</html>
